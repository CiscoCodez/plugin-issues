name: Feature Request
description: Suggest an idea or improvement for one of our plugins
labels: ["enhancement", "triage"]
body:
  - type: dropdown
    id: plugin
    attributes:
      label: Plugin
      description: Which plugin is this request for?
      options:
        - AstralSwords
        - TrimBlades
        - Token
        - FaithBreak
        - All / General
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: Is your feature request related to a problem? Describe it.
      placeholder: "e.g. I find it frustrating when..."

  - type: textarea
    id: solution
    attributes:
      label: Suggested Solution
      description: What would you like to see added or changed?
      placeholder: "A clear description of what you want to happen."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples that might help.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked that this feature hasn't already been requested
          required: true
